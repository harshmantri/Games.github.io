<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Game</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    /* PERFECT mobile background */
    background: url('background.jpg') no-repeat center center;
    background-size: cover; /* fills screen without distortion */

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

/* Dark overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
}

/* Container */
.container {
    position: relative;
    z-index: 1;
    width: 90%;
}

/* BIG responsive heading */
h1 {
    font-size: 6vw; /* scales with screen */
    color: #ff2b2b;
    text-shadow: 0 0 10px red, 0 0 25px red;
    margin-bottom: 50px;
}

/* Buttons (mobile friendly) */
button {
    display: block;
    width: 80%;
    margin: 20px auto;
    padding: 18px;
    font-size: 5vw;
    border-radius: 12px;
    cursor: pointer;
    background: rgba(0,0,0,0.7);
    transition: 0.3s;
}

/* YES button */
.yes {
    color: white;
    border: 2px solid red;
    box-shadow: 0 0 15px red;
}

.yes:hover {
    box-shadow: 0 0 30px red;
}

/* NO button */
.no {
    color: #ccc;
    border: 2px solid gray;
}

.no:hover {
    box-shadow: 0 0 20px gray;
}

/* Result text */
#result {
    margin-top: 30px;
    font-size: 5.5vw;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">
    <h1>Would you like to participate in the Game?</h1>

    <button class="yes" onclick="yesClick()">YES</button>
    <button class="no" onclick="noClick()">NO</button>

    <p id="result"></p>
</div>

<script>
function yesClick() {
    document.getElementById("result").innerText = "🎉 Welcome to the Game!";
}

function noClick() {
    document.getElementById("result").innerText = "💀 You are Eliminated!";
}
</script>

</body>
</html>
