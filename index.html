<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Game</title>

<style>
body {
    margin: 0;
    background: url('background.jpg') no-repeat center center;
    background-size: cover;
    height: 100vh;
}

/* Invisible clickable areas */
.btn {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    height: 70px;
    cursor: pointer;
}

/* Position EXACTLY over your image buttons */
.yes {
    top: 55%;  /* adjust if needed */
}

.no {
    top: 68%;  /* adjust if needed */
}

/* Result text */
#result {
    position: absolute;
    top: 80%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 24px;
    font-weight: bold;
}
</style>

</head>

<body>

<!-- Invisible buttons -->
<div class="btn yes" onclick="yesClick()"></div>
<div class="btn no" onclick="noClick()"></div>

<p id="result"></p>

<script>
function yesClick() {
    document.getElementById("result").innerText = "🎉 Welcome to the Game!";
}

function noClick() {
    document.getElementById("result").innerText = "💀 You are Eliminated!";
}
</script>

</body>
</html>
