<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Game</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: url('background.jpg') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

/* Dark overlay for better visibility */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
}

/* Main container */
.container {
    position: relative;
    z-index: 1;
}

/* Title */
h1 {
    color: #ff2b2b;
    font-size: 32px;
    text-shadow: 
        0 0 5px red,
        0 0 10px red,
        0 0 20px red;
    margin-bottom: 40px;
}

/* Buttons */
button {
    display: block;
    margin: 20px auto;
    padding: 18px 70px;
    font-size: 22px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    background: rgba(0,0,0,0.7);
}

/* YES button (red glow) */
.yes {
    color: white;
    border: 2px solid red;
    box-shadow: 0 0 10px red;
}

.yes:hover {
    box-shadow: 0 0 25px red;
    transform: scale(1.05);
}

/* NO button (gray) */
.no {
    color: #ccc;
    border: 2px solid gray;
}

.no:hover {
    box-shadow: 0 0 15px gray;
    transform: scale(1.05);
}

/* Result text */
#result {
    margin-top: 30px;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 0 0 10px white;
}
</style>

</head>

<body>

<div class="container">
    <h1>Would you like to participate in the Game?</h1>

    <button class="yes" onclick="yesClick()">YES</button>
    <button class="no" onclick="noClick()">NO</button>

    <p id="result"></p>
</div>

<script>
function yesClick() {
    document.getElementById("result").innerText = "🎉 Welcome to the Game!";
}

function noClick() {
    document.getElementById("result").innerText = "💀 You are Eliminated!";
}
</script>

</body>
</html>
