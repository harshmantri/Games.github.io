<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Game</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1526401485004-2aa7f3a5cdb3') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

.container {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 15px;
}

h1 {
    color: #ff3b3b;
    text-shadow: 0 0 15px red;
    font-size: 28px;
}

button {
    display: block;
    margin: 15px auto;
    padding: 15px 60px;
    font-size: 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.yes {
    background: black;
    color: white;
    border: 2px solid red;
    box-shadow: 0 0 10px red;
}

.yes:hover {
    box-shadow: 0 0 20px red;
}

.no {
    background: black;
    color: gray;
    border: 2px solid gray;
}

.no:hover {
    box-shadow: 0 0 10px gray;
}

#result {
    margin-top: 20px;
    font-size: 24px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">
    <h1>Would you like to participate in the Game?</h1>

    <button class="yes" onclick="yesClick()">YES</button>
    <button class="no" onclick="noClick()">NO</button>

    <p id="result"></p>
</div>

<script>
function yesClick() {
    document.getElementById("result").innerText = "🎉 Welcome to the Game!";
}

function noClick() {
    document.getElementById("result").innerText = "💀 You are Eliminated!";
}
</script>

</body>
</html>
